version: "3.8"

services:
  web:
    build: .
    container_name: noteweb_app
    ports:
      - "8080:80"
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: noteweb_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: noteweb
    ports:
      - "3307:3306"
